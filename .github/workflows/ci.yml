name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/querymesh
      API_KEY_PEPPER: ci-test-pepper-not-for-production
      REDIS_URL: redis://127.0.0.1:6379/0
      RATE_LIMIT_STORAGE_URI: memory://
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python
        run: uv python install 3.12

      - name: Sync
        run: uv sync --frozen --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pytest (fast suite)
        run: uv run pytest -q
