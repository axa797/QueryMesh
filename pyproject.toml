[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "querymesh"
version = "0.1.0"
description = "Multi-agent GCP knowledge assistant (internal)."
requires-python = ">=3.12"
license = "LicenseRef-Proprietary"

dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
]

[dependency-groups]
dev = [
  "httpx>=0.27",
  "ruff>=0.9",
  "pytest>=8",
]

[tool.hatch.build.targets.wheel]
packages = [
  "api",
  "agents",
  "graph",
  "ingestion",
  "memory",
  "observability",
  "tools",
  "evals",
]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["api", "agents", "graph", "ingestion", "memory", "observability", "tools", "evals", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["evals", "tests"]
pythonpath = ["."]
