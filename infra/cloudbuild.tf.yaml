# Terraform apply pipeline — triggered by Cloud Build when infra/terraform/** changes on main.
#
# Trigger created by scripts/bootstrap_gcp.sh (tf-apply trigger).
# State is stored in GCS: gs://${PROJECT_ID}-tf-state/terraform/state
#
# After a successful apply, the `reconcile-deploy` step:
#   1. Writes new secret versions for DATABASE_URL, REDIS_URL, QDRANT_URL from
#      terraform outputs (Cloud SQL connection name, Redis host/port, Qdrant URL).
#   2. Updates the `deploy` trigger's `_EXTRA_DEPLOY_ARGS` substitution so all
#      subsequent app-code pushes deploy to Cloud Run with the correct secret
#      bindings, Cloud SQL attachment, and VPC connector — no manual steps.

substitutions:
  _REGION: us-central1
  _DEPLOY_TRIGGER: deploy
  _VPC_CONNECTOR_NAME: querymesh-connector

options:
  logging: CLOUD_LOGGING_ONLY

# Infra applies (SQL + Redis + connector churn) can exceed 20m; allow headroom.
timeout: 2400s

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DB_PASSWORD/versions/latest
      env: DB_PASSWORD

steps:
  # ------------------------------------------------------------------
  # 1. terraform init — GCS backend at gs://${PROJECT_ID}-tf-state
  # ------------------------------------------------------------------
  - name: hashicorp/terraform:1.10
    id: tf-init
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        cd infra/terraform
        terraform init \
          -backend-config="bucket=${PROJECT_ID}-tf-state" \
          -backend-config="prefix=terraform/state" \
          -input=false \
          -reconfigure

  # ------------------------------------------------------------------
  # 2. Adopt pre-existing GCP resources into state (idempotent).
  #    Avoids 409 when a prior apply partially succeeded (secret / VPC connector).
  # ------------------------------------------------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: tf-adopt
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        apt-get update -qq
        apt-get install -y -qq wget unzip >/dev/null
        TF_VER=1.10.0
        wget -q "https://releases.hashicorp.com/terraform/$${TF_VER}/terraform_$${TF_VER}_linux_amd64.zip" -O /tmp/tf.zip
        unzip -qo /tmp/tf.zip -d /usr/local/bin
        chmod +x /usr/local/bin/terraform
        cd infra/terraform

        adopt_secret() {
          local id="$$1"
          local addr secret_path
          addr=$$(printf 'google_secret_manager_secret.derived["%s"]' "$$id")
          secret_path=$$(printf 'projects/%s/secrets/%s' "${PROJECT_ID}" "$$id")
          if terraform state show -no-color "$$addr" >/dev/null 2>&1; then
            echo "[=] secret $$id already in state"
            return 0
          fi
          if gcloud secrets describe "$$id" --project="${PROJECT_ID}" >/dev/null 2>&1; then
            echo "[+] importing secret $$id into terraform state"
            terraform import -var="project_id=${PROJECT_ID}" -var="region=${_REGION}" \
              "$$addr" "$$secret_path"
          fi
        }
        for SECRET_ID in QDRANT_URL DATABASE_URL REDIS_URL; do
          adopt_secret "$$SECRET_ID"
        done

        if terraform state show -no-color google_vpc_access_connector.connector >/dev/null 2>&1; then
          echo "[=] VPC access connector already in state"
        elif gcloud compute networks vpc-access connectors describe "${_VPC_CONNECTOR_NAME}" \
            --region="${_REGION}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
          echo "[+] importing VPC access connector into terraform state"
          terraform import -var="project_id=${PROJECT_ID}" -var="region=${_REGION}" \
            google_vpc_access_connector.connector \
            "projects/${PROJECT_ID}/locations/${_REGION}/connectors/${_VPC_CONNECTOR_NAME}"
        fi
    waitFor: [tf-init]

  # ------------------------------------------------------------------
  # 3. terraform validate
  # ------------------------------------------------------------------
  - name: hashicorp/terraform:1.10
    id: tf-validate
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        cd infra/terraform
        terraform validate
    waitFor: [tf-adopt]

  # ------------------------------------------------------------------
  # 4. terraform plan — writes a plan file for apply
  # ------------------------------------------------------------------
  - name: hashicorp/terraform:1.10
    id: tf-plan
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        cd infra/terraform
        terraform plan \
          -var="project_id=${PROJECT_ID}" \
          -var="region=${_REGION}" \
          -out=/workspace/tf.plan \
          -input=false
    waitFor: [tf-validate]

  # ------------------------------------------------------------------
  # 5. terraform apply — executes the saved plan
  # ------------------------------------------------------------------
  - name: hashicorp/terraform:1.10
    id: tf-apply
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        cd infra/terraform
        terraform apply -auto-approve /workspace/tf.plan
    waitFor: [tf-plan]

  # ------------------------------------------------------------------
  # 6. Emit terraform outputs as JSON for the reconcile step.
  #    Writes /workspace/tf_outputs.json — consumed by reconcile-deploy.
  # ------------------------------------------------------------------
  - name: hashicorp/terraform:1.10
    id: tf-output
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        cd infra/terraform
        terraform output -json > /workspace/tf_outputs.json
        echo "=== Terraform outputs (summary) ==="
        terraform output
    waitFor: [tf-apply]

  # ------------------------------------------------------------------
  # 7. Reconcile deploy trigger + derived secrets.
  #
  # This step is the whole reason this file is more than "terraform apply" —
  # it makes the bootstrap → apply → deploy flow truly zero-manual-steps.
  #
  # Idempotent: compares computed values to current secret versions and skips
  # writes when unchanged; compares trigger substitution to target and skips
  # update when unchanged. Safe to run on every apply.
  # ------------------------------------------------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: reconcile-deploy
    entrypoint: bash
    secretEnv: [DB_PASSWORD]
    args:
      - -c
      - |
        set -euo pipefail

        # --- Read terraform outputs (from /workspace/tf_outputs.json) ---
        json() { python3 -c "import json,sys;print(json.load(open('/workspace/tf_outputs.json'))['$$1']['value'])"; }

        SQL_CONN=$(json database_connection_name)
        REDIS_HOST=$(json redis_host)
        REDIS_PORT=$(json redis_port)
        QDRANT_URL=$(json qdrant_url)
        VPC_CONN_ID=$(json vpc_connector_id)  # projects/P/locations/R/connectors/NAME
        VPC_CONN_NAME="$${VPC_CONN_ID##*/}"

        DB_USER="querymesh"
        DB_NAME="querymesh"
        DATABASE_URL="postgresql+asyncpg://$${DB_USER}:$${DB_PASSWORD}@/$${DB_NAME}?host=/cloudsql/$${SQL_CONN}"
        REDIS_URL="redis://$${REDIS_HOST}:$${REDIS_PORT}/0"

        # --- Helper: upsert a secret version only if the value changed ---
        upsert_secret_version() {
          local name="$$1" value="$$2"
          local current
          current=$$(gcloud secrets versions access latest \
            --project="${PROJECT_ID}" --secret="$${name}" 2>/dev/null || echo "")
          if [ "$${current}" = "$${value}" ]; then
            echo "  [=] $${name} unchanged"
          else
            printf '%s' "$${value}" | gcloud secrets versions add "$${name}" \
              --project="${PROJECT_ID}" --data-file=- >/dev/null
            echo "  [+] $${name} updated (new version)"
          fi
        }

        echo "=== Reconciling derived secrets ==="
        upsert_secret_version DATABASE_URL "$${DATABASE_URL}"
        upsert_secret_version REDIS_URL    "$${REDIS_URL}"
        upsert_secret_version QDRANT_URL   "$${QDRANT_URL}"

        # --- Compose _EXTRA_DEPLOY_ARGS for the deploy trigger ---
        # Spaces are intentional: Cloud Run's gcloud run deploy reads this as a
        # single flag blob via shell expansion in infra/cloudbuild.yaml.
        EXTRA_ARGS="--set-secrets=DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,QDRANT_URL=QDRANT_URL:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,LANGFUSE_PUBLIC_KEY=LANGFUSE_PUBLIC_KEY:latest,LANGFUSE_SECRET_KEY=LANGFUSE_SECRET_KEY:latest,PORTAL_JWT_SECRET=PORTAL_JWT_SECRET:latest --add-cloudsql-instances=$${SQL_CONN} --vpc-connector=$${VPC_CONN_NAME} --vpc-egress=private-ranges-only --set-env-vars=^@^GOOGLE_CLOUD_PROJECT=${PROJECT_ID}@GOOGLE_CLOUD_LOCATION=${_REGION}@QDRANT_COLLECTION=gcp_docs@RAG_VERTEX_RERANK=true@INGESTION_GCP_DOCS_DIR=/app/corpus/gcp_docs"

        echo
        echo "=== Reconciling deploy trigger substitution ==="

        # Skip update if the substitution already matches (idempotent, quiet logs).
        CURRENT_ARGS=$$(gcloud builds triggers describe "${_DEPLOY_TRIGGER}" \
          --project="${PROJECT_ID}" --region="${_REGION}" \
          --format='value(substitutions._EXTRA_DEPLOY_ARGS)' 2>/dev/null || echo "")

        if [ "$${CURRENT_ARGS}" = "$${EXTRA_ARGS}" ]; then
          echo "  [=] deploy trigger _EXTRA_DEPLOY_ARGS unchanged"
        else
          # gcloud --update-substitutions splits on commas; escape commas in the value.
          EXTRA_ARGS_FOR_GCLOUD=$$(E="$${EXTRA_ARGS}" python3 -c 'import os; print(os.environ["E"].replace(",", chr(92)+","))')
          PROJECT_NUMBER=$$(gcloud projects describe "${PROJECT_ID}" --format='value(projectNumber)')
          TRIGGER_SA="projects/${PROJECT_ID}/serviceAccounts/$${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          gcloud builds triggers update github "${_DEPLOY_TRIGGER}" \
            --project="${PROJECT_ID}" --region="${_REGION}" \
            --service-account="$${TRIGGER_SA}" \
            --update-substitutions="_EXTRA_DEPLOY_ARGS=$${EXTRA_ARGS_FOR_GCLOUD}" >/dev/null
          echo "  [+] deploy trigger _EXTRA_DEPLOY_ARGS updated"
        fi

        echo
        echo "Reconcile complete. Next push to main will deploy with the correct"
        echo "Cloud SQL attachment, VPC connector, and secret bindings."
    waitFor: [tf-output]
