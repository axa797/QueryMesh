# Terraform apply pipeline — triggered by Cloud Build when infra/terraform/** changes on main.
#
# Trigger created by scripts/bootstrap_gcp.sh (tf-apply trigger).
# State is stored in GCS: gs://${PROJECT_ID}-tf-state/terraform/state

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s

steps:
  # terraform init with GCS backend — bucket is always ${PROJECT_ID}-tf-state
  - name: hashicorp/terraform:1.10
    id: tf-init
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        cd infra/terraform
        terraform init \
          -backend-config="bucket=${PROJECT_ID}-tf-state" \
          -backend-config="prefix=terraform/state" \
          -input=false \
          -reconfigure

  # terraform validate — catches syntax errors before applying
  - name: hashicorp/terraform:1.10
    id: tf-validate
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        cd infra/terraform
        terraform validate
    waitFor: [tf-init]

  # terraform plan — writes plan file for apply; output visible in Cloud Build logs
  - name: hashicorp/terraform:1.10
    id: tf-plan
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        cd infra/terraform
        terraform plan \
          -var="project_id=${PROJECT_ID}" \
          -var="region=${_REGION}" \
          -out=/workspace/tf.plan \
          -input=false
    waitFor: [tf-validate]

  # terraform apply — executes the saved plan
  - name: hashicorp/terraform:1.10
    id: tf-apply
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        cd infra/terraform
        terraform apply -auto-approve /workspace/tf.plan
    waitFor: [tf-plan]

  # Emit outputs to Cloud Build logs for reference
  - name: hashicorp/terraform:1.10
    id: tf-output
    entrypoint: sh
    args:
      - -c
      - |
        cd infra/terraform
        echo "=== Terraform outputs ==="
        terraform output
    waitFor: [tf-apply]
