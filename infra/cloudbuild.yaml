# Build, migrate, deploy to Cloud Run (us-central1), then trigger corpus ingest.
#
# Triggered automatically by Cloud Build 'deploy' trigger on push to main
# (created by scripts/bootstrap_gcp.sh).
#
# Manual submit:
#   gcloud builds submit --config infra/cloudbuild.yaml
#
# Pass extra Cloud Run flags (secrets, VPC, env vars) via substitution — use
# the value from `terraform output deploy_command` after first terraform apply:
#   gcloud builds submit --config infra/cloudbuild.yaml \
#     --substitutions=_EXTRA_DEPLOY_ARGS="--set-secrets=... --vpc-connector=..."

substitutions:
  _REGION: us-central1
  _AR_REPO: querymesh
  _SERVICE: api
  _SQL_INSTANCE: querymesh-pg  # Cloud SQL instance name (matches terraform/sql.tf)
  _EXTRA_DEPLOY_ARGS: ""

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DB_PASSWORD/versions/latest
      env: DB_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/API_KEY_PEPPER/versions/latest
      env: API_KEY_PEPPER
    - versionName: projects/$PROJECT_ID/secrets/INGEST_SERVICE_KEY/versions/latest
      env: INGEST_SERVICE_KEY
    - versionName: projects/$PROJECT_ID/secrets/QDRANT_URL/versions/latest
      env: QDRANT_URL
    - versionName: projects/$PROJECT_ID/secrets/QDRANT_API_KEY/versions/latest
      env: QDRANT_API_KEY

steps:
  # ------------------------------------------------------------------
  # 1. Build image
  # ------------------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -f
      - infra/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest
      - .

  # ------------------------------------------------------------------
  # 2. Scan image for secrets in layers (non-root env/arg metadata)
  # ------------------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: scan-image
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMG="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}"
        echo "=== Image layer metadata scan ==="
        # Inspect all ENV and ARG entries baked into image layers
        LAYER_DATA=$(docker inspect "$$IMG" --format '{{json .Config.Env}}' 2>/dev/null || echo "[]")
        # Fail if any known secret patterns appear in layer metadata
        PATTERNS="AKIA[0-9A-Z]{16}|sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{36}|-----BEGIN.*PRIVATE KEY"
        if echo "$$LAYER_DATA" | grep -qE "$$PATTERNS"; then
          echo "ERROR: Secret pattern detected in image layer metadata. Aborting."
          exit 1
        fi
        echo "Image layer scan passed."
    waitFor: [build]

  # ------------------------------------------------------------------
  # 3. Push image
  # ------------------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}
    waitFor: [scan-image]

  # ------------------------------------------------------------------
  # 4. Cloud SQL Auth Proxy — background sidecar for migration
  # ------------------------------------------------------------------
  - name: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
    id: sql-proxy
    args:
      - --port=5432
      - ${PROJECT_ID}:${_REGION}:${_SQL_INSTANCE}
    background: true
    waitFor: ["-"]  # start immediately, parallel with build

  # ------------------------------------------------------------------
  # 5. Alembic migration — idempotent, safe on every deploy
  # ------------------------------------------------------------------
  - name: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
    id: migrate
    entrypoint: bash
    secretEnv: [DB_PASSWORD]
    args:
      - -c
      - |
        set -euo pipefail
        # Give the proxy a moment to be ready
        sleep 4
        echo "Running Alembic migrations..."
        DATABASE_URL="postgresql+asyncpg://querymesh:$$DB_PASSWORD@127.0.0.1:5432/querymesh" \
          uv run alembic upgrade head
        echo "Migrations complete."
    waitFor: [sql-proxy, push]

  # ------------------------------------------------------------------
  # 6. Deploy to Cloud Run
  # ------------------------------------------------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMG="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}"
        gcloud run deploy ${_SERVICE} \
          --image "$$IMG" \
          --region ${_REGION} \
          --platform managed \
          --cpu 2 \
          --memory 4Gi \
          --min-instances 0 \
          --max-instances 10 \
          --port 8080 \
          --allow-unauthenticated \
          --set-secrets=API_KEY_PEPPER=API_KEY_PEPPER:latest,E2B_API_KEY=E2B_API_KEY:latest \
          ${_EXTRA_DEPLOY_ARGS}
    waitFor: [migrate]

  # ------------------------------------------------------------------
  # 7. Trigger corpus ingest — skipped if Qdrant already populated
  # ------------------------------------------------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: ingest
    entrypoint: bash
    secretEnv: [INGEST_SERVICE_KEY, QDRANT_URL, QDRANT_API_KEY]
    args:
      - -c
      - |
        set -euo pipefail

        # Check Qdrant: how many vectors are already in the collection?
        QDRANT_COUNT=$(curl -sf \
          -H "api-key: $$QDRANT_API_KEY" \
          "$$QDRANT_URL/collections/gcp_docs" 2>/dev/null \
          | python3 -c "
import sys, json
d = json.load(sys.stdin)
print(d.get('result', {}).get('vectors_count') or 0)
" 2>/dev/null || echo "0")

        echo "Qdrant gcp_docs collection vector count: $$QDRANT_COUNT"

        if [[ "$$QDRANT_COUNT" -gt "0" ]]; then
          echo "Collection already populated — skipping ingest."
          exit 0
        fi

        API_URL=$(gcloud run services describe ${_SERVICE} \
          --region ${_REGION} \
          --format='value(status.url)')
        echo "Collection empty — triggering corpus ingest at $$API_URL/ingest ..."

        STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
          -X POST "$$API_URL/ingest" \
          -H "Authorization: Bearer $$INGEST_SERVICE_KEY" \
          -H "Content-Type: application/json" \
          -d '{"source":"gcp_docs"}' || echo "000")

        if [[ "$$STATUS" == "200" || "$$STATUS" == "202" ]]; then
          echo "Ingest triggered (status $$STATUS). Indexing runs in the background."
        else
          echo "Ingest returned HTTP $$STATUS — check /ingest/{job_id} manually. Not blocking deploy."
        fi
    waitFor: [deploy]
