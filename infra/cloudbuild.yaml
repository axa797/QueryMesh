# Build, migrate, deploy to Cloud Run (us-central1), then trigger corpus ingest.
#
# Triggered automatically by Cloud Build 'deploy' trigger on push to main
# (created by scripts/bootstrap_gcp.sh).
#
# Manual submit:
#   gcloud builds submit --config infra/cloudbuild.yaml
#
# Pass extra Cloud Run flags (secrets, VPC, env vars) via substitution — use
# the value from `terraform output deploy_command` after first terraform apply:
#   gcloud builds submit --config infra/cloudbuild.yaml \
#     --substitutions=_EXTRA_DEPLOY_ARGS="--set-secrets=... --vpc-connector=..."

substitutions:
  _REGION: us-central1
  _AR_REPO: querymesh
  _SERVICE: api
  _SQL_INSTANCE: querymesh-pg  # Cloud SQL instance name (matches terraform/sql.tf)
  _QDRANT_COLLECTION: gcp_docs
  _EXTRA_DEPLOY_ARGS: ""

options:
  logging: CLOUD_LOGGING_ONLY

# Build-time secrets only. API_KEY_PEPPER and E2B_API_KEY are injected at runtime
# via Cloud Run --set-secrets in the deploy step, so they are not listed here.
# Cloud Build rejects (with INVALID_ARGUMENT) any availableSecrets entry that is
# not consumed by a step's secretEnv.
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DB_PASSWORD/versions/latest
      env: DB_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/INGEST_TOKEN/versions/latest
      env: INGEST_TOKEN
    - versionName: projects/$PROJECT_ID/secrets/QDRANT_URL/versions/latest
      env: QDRANT_URL
    - versionName: projects/$PROJECT_ID/secrets/QDRANT_API_KEY/versions/latest
      env: QDRANT_API_KEY

steps:
  # ------------------------------------------------------------------
  # 0. Fetch corpus — writes corpus/gcp_docs/*.md from the web.
  #    Skipped if the directory already exists and is non-empty (e.g. cached workspace).
  #    The Dockerfile COPYs corpus/gcp_docs/ into the image so ingest has files to read.
  # ------------------------------------------------------------------
  - name: python:3.12-slim
    id: fetch-corpus
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ -d corpus/gcp_docs ] && [ "$(ls -A corpus/gcp_docs 2>/dev/null)" ]; then
          echo "corpus/gcp_docs already present ($(ls corpus/gcp_docs | wc -l) files) — skipping fetch."
          exit 0
        fi
        PYTHONPATH=. python scripts/fetch_next26_corpus.py
        echo "Corpus fetch complete: $(ls corpus/gcp_docs | wc -l) files"

  # ------------------------------------------------------------------
  # 1. Build image (corpus/gcp_docs is now present from step 0)
  # ------------------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: build
    waitFor: [fetch-corpus]
    args:
      - build
      - -f
      - infra/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest
      - .

  # ------------------------------------------------------------------
  # 2. Scan image for secrets in layers (non-root env/arg metadata)
  # ------------------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: scan-image
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMG="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}"
        echo "=== Image layer metadata scan ==="
        # Inspect all ENV and ARG entries baked into image layers
        LAYER_DATA=$(docker inspect "$$IMG" --format '{{json .Config.Env}}' 2>/dev/null || echo "[]")
        # Fail if any known secret patterns appear in layer metadata
        PATTERNS="AKIA[0-9A-Z]{16}|sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{36}|-----BEGIN.*PRIVATE KEY"
        if echo "$$LAYER_DATA" | grep -qE "$$PATTERNS"; then
          echo "ERROR: Secret pattern detected in image layer metadata. Aborting."
          exit 1
        fi
        echo "Image layer scan passed."
    waitFor: [build]

  # ------------------------------------------------------------------
  # 3. Push image
  # ------------------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}
    waitFor: [scan-image]

  # ------------------------------------------------------------------
  # 4. Alembic migration — Cloud SQL Auth Proxy runs in-process. (Regional Cloud
  #    Build rejects `background: true` on BuildStep, so no sidecar step.)
  # ------------------------------------------------------------------
  - name: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
    id: migrate
    entrypoint: bash
    secretEnv: [DB_PASSWORD]
    args:
      - -c
      - |
        set -euo pipefail
        # Cloud Build sets HOME=/builder/home; the image USER is appuser — not writable.
        export UV_CACHE_DIR=/tmp/uv-cache
        mkdir -p "$${UV_CACHE_DIR}"
        PROXY_BIN="/tmp/cloud-sql-proxy"
        PROXY_VER="2.11.4"
        INSTANCE_CONN="${PROJECT_ID}:${_REGION}:${_SQL_INSTANCE}"
        PROXY_PORT="5433"
        echo "Downloading Cloud SQL Auth Proxy $${PROXY_VER} ..."
        PROXY_URL="https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v$${PROXY_VER}/cloud-sql-proxy.linux.amd64"
        python3 -c "import urllib.request,sys; urllib.request.urlretrieve(sys.argv[1], sys.argv[2])" \
          "$${PROXY_URL}" "$${PROXY_BIN}"
        chmod +x "$${PROXY_BIN}"
        echo "Starting proxy for $${INSTANCE_CONN} on port $${PROXY_PORT} ..."
        "$${PROXY_BIN}" --port "$${PROXY_PORT}" "$${INSTANCE_CONN}" &
        PROXY_PID=$$!
        sleep 4
        echo "Running Alembic migrations..."
        cd /app
        DATABASE_URL="postgresql+asyncpg://querymesh:$$DB_PASSWORD@127.0.0.1:$${PROXY_PORT}/querymesh" \
          uv run alembic upgrade head
        echo "Migrations complete."
        kill "$${PROXY_PID}" 2>/dev/null || true
    waitFor: [push]

  # ------------------------------------------------------------------
  # 6. Deploy to Cloud Run
  # ------------------------------------------------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMG="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}"
        gcloud run deploy ${_SERVICE} \
          --image "$$IMG" \
          --region ${_REGION} \
          --platform managed \
          --cpu 2 \
          --memory 4Gi \
          --no-cpu-throttling \
          --min-instances 1 \
          --max-instances 10 \
          --port 8080 \
          --allow-unauthenticated \
          --set-env-vars=INGESTION_GCP_DOCS_DIR=/app/corpus/gcp_docs \
          ${_EXTRA_DEPLOY_ARGS}
    waitFor: [migrate]

  # ------------------------------------------------------------------
  # 7. Prune old images — delete all but the 5 most recent :BUILD_ID tags.
  #    The :latest tag is always kept. Artifact Registry cleanup policy handles
  #    untagged layers, but explicit pruning here keeps tagged image count low.
  # ------------------------------------------------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: prune-images
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        REPO="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}"
        echo "Pruning old images from $$REPO ..."
        # List all digests sorted by creation time, skip the 5 newest, delete the rest.
        DIGESTS=$(gcloud artifacts docker images list "$$REPO" \
          --format="value(version)" \
          --sort-by="~CREATE_TIME" 2>/dev/null | tail -n +6 || true)
        if [[ -z "$$DIGESTS" ]]; then
          echo "Nothing to prune."
        else
          echo "$$DIGESTS" | while read -r digest; do
            gcloud artifacts docker images delete "$$REPO@$$digest" --quiet --async 2>/dev/null || true
          done
          echo "Old images queued for deletion."
        fi
    waitFor: [deploy]

  # ------------------------------------------------------------------
  # 8. Trigger corpus ingest when needed:
  #    - Qdrant collection is empty (fresh env / wiped volume), OR
  #    - ingestion code, embeddings, or corpus scripts changed in this push
  # ------------------------------------------------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: ingest
    entrypoint: bash
    secretEnv: [INGEST_TOKEN, QDRANT_URL, QDRANT_API_KEY]
    args:
      - -c
      - |
        set -euo pipefail
        SHOULD_INGEST=false

        # 1. Check Qdrant collection vector count (api-key only; Cloud Run allows
        # unauthenticated invoke — see infra/terraform/qdrant.tf IAM).
        QDR_RESP=$$(curl -sS -w "\n%{http_code}" \
          -H "api-key: $$QDRANT_API_KEY" \
          "$$QDRANT_URL/collections/${_QDRANT_COLLECTION}" 2>/dev/null || printf '\n000')
        QDR_CODE=$$(echo "$$QDR_RESP" | tail -n1)
        QDR_BODY=$$(echo "$$QDR_RESP" | sed '$$d')
        if [[ "$$QDR_CODE" == "200" ]]; then
          QDRANT_COUNT=$$(echo "$$QDR_BODY" | jq -r '.result.vectors_count // 0' 2>/dev/null || echo "0")
        else
          echo "Qdrant collection probe HTTP $$QDR_CODE — treating as ingest required"
          QDRANT_COUNT=0
          SHOULD_INGEST=true
        fi
        echo "Qdrant '${_QDRANT_COLLECTION}' vector count: $$QDRANT_COUNT"
        if [[ "$$QDRANT_COUNT" -eq "0" ]]; then
          echo "  → collection empty, ingest required"
          SHOULD_INGEST=true
        fi

        # 2. Corpus-related file diff: shallow clones often lack HEAD~1.
        if ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
          git fetch --deepen=50 2>/dev/null || true
        fi
        if ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
          echo "  → no parent commit for corpus diff; treating as corpus-related change"
          CORPUS_FILES_CHANGED=1
        else
          CORPUS_FILES_CHANGED=$(git diff HEAD~1 HEAD --name-only -- \
            ingestion/ \
            scripts/fetch_next26_corpus.py \
            2>/dev/null | grep -c . || echo "0")
        fi
        if [[ "$$CORPUS_FILES_CHANGED" -gt "0" ]]; then
          echo "  → $$CORPUS_FILES_CHANGED corpus-related file(s) changed, ingest required"
          SHOULD_INGEST=true
        fi

        if [[ "$$SHOULD_INGEST" == "false" ]]; then
          echo "No ingest needed — collection populated and no corpus files changed."
          exit 0
        fi

        API_URL=$(gcloud run services describe ${_SERVICE} \
          --region ${_REGION} \
          --format='value(status.url)')
        echo "Triggering corpus ingest at $$API_URL/ingest ..."

        # No curl -f: non-2xx must still capture %{http_code} only; with -f, bash runs
        # `|| echo 000` and stdout becomes "401000".
        STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
          -X POST "$$API_URL/ingest" \
          -H "Authorization: Bearer $$INGEST_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"source":"gcp_docs"}' || echo "000")

        if [[ "$$STATUS" == "200" || "$$STATUS" == "202" ]]; then
          echo "Ingest triggered (status $$STATUS). Indexing runs in the background."
        else
          echo "Ingest returned HTTP $$STATUS — check /ingest/{job_id} manually. Not blocking deploy."
        fi
    waitFor: [deploy]
